<app-main>
  <div class="alerts-container">
    <!-- Topbar -->
    <div class="topbar">
      <div class="title-wrapper">
        <div class="icon-wrapper">
          <i [class]="getIconClass('alerts')" class="item-icon"></i>
          <span *ngIf="totalActiveCalls > 0" class="badge">{{
            totalActiveCalls
          }}</span>
        </div>
        <span class="page-title">Central de Alertas</span>
      </div>

      <div class="search-wrapper">
        <app-search-input
          placeholder="Digite para pesquisar..."
          (search)="onSearch($event)"
        ></app-search-input>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-container">
      <mat-tab-group [(selectedIndex)]="selectedTabIndex">
        <!-- Chamados Ativos -->
        <mat-tab label="Chamados Ativos">
          <div class="alerts-content">
            <div class="alerts-list" (scroll)="onActiveScroll($event)">
              <ng-container
                *ngIf="activeAlerts.length > 0; else noActiveAlerts"
              >
                <app-alert-resident-card
                  *ngFor="let alert of activeAlerts"
                  [name]="alert.name"
                  [room]="alert.room"
                  [time]="alert.time"
                  [imageUrl]="alert.image"
                  [level]="alert.severity"
                  [status]="alert.status"
                  (click)="selectAlert(alert, false)"
                  [class.active]="selectedAlertDetail?.id === alert.id"
                ></app-alert-resident-card>
              </ng-container>

              <ng-template #noActiveAlerts>
                <div class="no-alerts" *ngIf="!activeLoading">
                  <i
                    class="fa-solid fa-bell"
                    style="font-size: 4rem; color: #ccc"
                  ></i>
                  <p>Sem chamados ativos no momento</p>
                </div>
              </ng-template>

              <!-- Loader sempre visível se estiver carregando -->
              <div *ngIf="activeLoading" class="loading-spinner">
                Carregando mais...
              </div>
            </div>

            <div class="alert-details">
              <ng-container *ngIf="selectedAlertDetail; else noSelection">
                <app-alert-resident-detail-card
                  [alertDetail]="selectedAlertDetail"
                  (updated)="onAlertUpdated($event)"
                ></app-alert-resident-detail-card>
              </ng-container>
              <ng-template #noSelection>
                <p>Selecione um chamado para ver os detalhes</p>
              </ng-template>
            </div>
          </div>
        </mat-tab>

        <!-- Histórico -->
        <mat-tab label="Histórico">
          <div class="alerts-content">
            <div class="alerts-list" (scroll)="onFinishedScroll($event)">
              <ng-container
                *ngIf="finishedAlerts.length > 0; else noFinishedAlerts"
              >
                <app-alert-resident-card
                  *ngFor="let alert of finishedAlerts"
                  [name]="alert.name"
                  [room]="alert.room"
                  [time]="alert.time"
                  [imageUrl]="alert.image"
                  [level]="alert.severity"
                  [status]="alert.status"
                  [observation]="alert.observations"
                  (click)="selectAlert(alert, true)"
                  [class.active]="selectedAlertDetail?.id === alert.id"
                ></app-alert-resident-card>
              </ng-container>

              <ng-template #noFinishedAlerts>
                <div class="no-alerts" *ngIf="!finishedLoading">
                  <i
                    class="fa-solid fa-bell"
                    style="font-size: 4rem; color: #ccc"
                  ></i>
                  <p>Sem histórico de chamados</p>
                </div>
              </ng-template>

              <!-- Loader sempre visível se estiver carregando -->
              <div *ngIf="finishedLoading" class="loading-spinner">
                Carregando mais...
              </div>
            </div>

            <div class="alert-details">
              <ng-container *ngIf="selectedAlertDetail; else noSelection">
                <app-alert-resident-detail-card
                  [alertDetail]="selectedAlertDetail"
                ></app-alert-resident-detail-card>
              </ng-container>
              <ng-template #noSelection>
                <p>Selecione um chamado para ver os detalhes</p>
              </ng-template>
            </div>
          </div>
        </mat-tab>
      </mat-tab-group>
    </div>
  </div>
</app-main>
