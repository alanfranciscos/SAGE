<app-main>
  <div class="topbar">
    <div class="title-wrapper">
      <div class="icon-wrapper">
        <i [class]="getIconClass('alerts')" class="item-icon"></i>
        <span *ngIf="totalActiveCalls > 0" class="badge">{{
          totalActiveCalls
        }}</span>
      </div>
      <span class="page-title">Central de Alertas</span>
    </div>

    <div class="search-wrapper">
      <app-search-input
        placeholder="Digite para pesquisar..."
      ></app-search-input>
    </div>
  </div>
  <app-alert-resident-card></app-alert-resident-card>
</app-main>
