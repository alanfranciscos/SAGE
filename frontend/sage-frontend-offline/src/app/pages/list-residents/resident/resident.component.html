<div [ngClass]="levelStyle" class="resident-container">
  <div class="image-content">
    <img [src]="showImage" alt="Event image" *ngIf="image" class="image-preview" />
  </div>
  <div class="resident-info">
    <h3 class="resident-name">{{name}}</h3>
    <p class="resident-details">{{room}}</p>
  </div>
  <div class="resident-actions">
    <app-button [label]="'Detalhes'" [type]="'secondary'" (clicked)="showDetails.emit(id)"></app-button>
  </div>
</div>
