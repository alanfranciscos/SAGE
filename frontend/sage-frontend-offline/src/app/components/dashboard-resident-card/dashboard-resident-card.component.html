<div
  class="resident-card"
  [ngClass]="['status-' + status, daltonicMode ? 'daltonic-mode' : '']"
  (click)="onCardClick()"
>
  <div class="resident-header">
    <div class="resident-avatar">
      <img
        [src]="residentImage || 'assets/default_user_avatar.png'"
        alt="Resident"
      />
    </div>
    <div class="resident-name">
      <h3>{{ residentName }}</h3>
      <p>Casa {{ houseNumber }}</p>
    </div>
  </div>

  <div class="resident-info">
    <div class="status-badge" [ngClass]="'status-' + status">
      <i [class]="getStatusIcon()"></i>
      <span>{{ getStatusText() }}</span>
    </div>
    <p>Chamados 24h: {{ totalCallsLast24Hours }}</p>
    <p>Última chamada: {{ formattedLastCall }}</p>
  </div>

  <button
    class="resident-button"
    (click)="onButtonClick(); $event.stopPropagation()"
  >
    {{ status === "normal" ? "Detalhes" : "Atender" }}
  </button>
</div>
