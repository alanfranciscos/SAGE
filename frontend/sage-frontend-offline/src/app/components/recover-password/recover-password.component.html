<h2 mat-dialog-title class="title">Recuperar Senha</h2>

<form *ngIf="!tokenSent" (ngSubmit)="enviarSolicitacao()" #emailForm="ngForm">
  <div mat-dialog-content class="dialog-content-fix">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="email" name="email" required />
    </mat-form-field>
  </div>

  <mat-dialog-actions align="end" class="actions">
    <button mat-stroked-button color="warn" mat-dialog-close>Cancelar</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="emailForm.invalid">
      Enviar
    </button>
  </mat-dialog-actions>
</form>

<form *ngIf="tokenSent" (ngSubmit)="redefinirSenha()" #resetForm="ngForm">
  <div mat-dialog-content class="dialog-content-fix">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Código recebido</mat-label>
      <input matInput type="text" [(ngModel)]="token" name="token" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nova senha</mat-label>
      <input matInput type="password" [(ngModel)]="novaSenha" name="novaSenha" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirmar nova senha</mat-label>
      <input matInput type="password" [(ngModel)]="confirmarSenha" name="confirmarSenha" required />
    </mat-form-field>
  </div>
  
  <mat-dialog-actions align="end" class="actions">
    <button mat-stroked-button color="warn" mat-dialog-close>Cancelar</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="resetForm.invalid">
      Redefinir Senha
    </button>
  </mat-dialog-actions>
</form>
