<div class="summary-card">
  <div class="summary-content">
    <h3>{{ title }}</h3>
    <div class="summary-value-icon">
      <p class="summary-value" [ngClass]="valueClass">{{ value }}</p>
      <div
        class="summary-icon flex items-center justify-center rounded-lg"
        [ngClass]="iconBgColor"
      >
        <i class="material-icons" [ngClass]="iconColor">{{ icon }}</i>
      </div>
    </div>
    <p *ngIf="delta" class="text-xs text-muted-foreground mt-1">{{ delta }}</p>
  </div>
</div>
