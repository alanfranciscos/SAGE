<aside class="sidebar">
  <div class="logo-container">
    <img src="assets/svg/logo.svg" alt="SAGE Logo" class="logo" />
  </div>
  <div class="items">
    <app-tooltip-wrapper
      tooltip="Ir para a tela de residentes"
      position="right"
      [showDelay]="500"
      [hideDelay]="200"
    >
      <a
        [routerLink]="[links.get('dashboard')]"
        class="item"
        [ngClass]="{
          'item-active': links.get('dashboard') === getActiveRoute()
        }"
        (click)="setActiveItem('dashboard')"
      >
        <p class="item-text">Residentes</p>
      </a>
    </app-tooltip-wrapper>
    <app-tooltip-wrapper
      tooltip="Ir para a tela de alertas"
      position="right"
      [showDelay]="500"
      [hideDelay]="200"
    >
      <a
        [routerLink]="['/alerts']"
        class="item"
        [ngClass]="{ 'item-active': getActiveRoute() === '/alerts' }"
        (click)="setActiveItem('alerts')"
      >
        <p class="item-text">Alertas</p>
      </a>
    </app-tooltip-wrapper>
    <app-tooltip-wrapper
      tooltip="Ir para a tela de relatórios"
      position="right"
      [showDelay]="500"
      [hideDelay]="200"
    >
      <a [routerLink]="['/reports']" class="item">
        <p class="item-text">Relatórios</p>
      </a>
    </app-tooltip-wrapper>
    <app-tooltip-wrapper
      tooltip="Ir para a tela de configurações"
      position="right"
      [showDelay]="500"
      [hideDelay]="200"
    >
      <a [routerLink]="['/settings']" class="item">
        <p class="item-text">Configurações</p>
      </a>
    </app-tooltip-wrapper>
  </div>
  <div class="exit-container">
    <a [routerLink]="['/']" class="exit">
      <app-button
        [label]="'Sair'"
        [type]="'secondary'"
        class="exit-button"
        [size]="'large'"
        [disabled]="true"
      ></app-button>
    </a>
  </div>
</aside>
