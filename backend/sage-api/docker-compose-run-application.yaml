version: "2"
services:
  postgres-sage:
    image: postgres:15
    container_name: postgres-sage
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=sage
    ports:
      - "5432:5432"
    networks:
      - my-networks

  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VERSION=local
    ports:
      - 8080:8080
    networks:
      - my-networks
    depends_on:
      - postgres-sage

networks:
  my-networks:
    driver: bridge
