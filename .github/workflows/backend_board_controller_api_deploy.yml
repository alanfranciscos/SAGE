name: board-controller-api-deploy

on:
  push:
    branches:
      - main

jobs:
  create-artifact-register-terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/modules/artifact_reegistry

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Google auth
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.11.1

      - name: Terraform Init
        run: terraform init -backend-config="prefix=state/artifact_registry/board-controller-api"

      - name: Terraform plan artifact registry
        run: terraform plan -var project_id='${{ secrets.PROJECT_ID }}'  -var repository_id="board-controller-api" -out=tfplan.plan -lock=false

      - name: Terraform apply artifact registry
        run: terraform apply -auto-approve tfplan.plan

  create-cloud-run-terraform:
    runs-on: ubuntu-latest
    needs: create-artifact-register-terraform
    defaults:
      run:
        working-directory: terraform/modules/cloud_run

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Google auth
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.11.1

      - name: Terraform Init
        run: terraform init -backend-config="prefix=state/cloud_run/board-controller-api"

      - name: Terraform plan cloud run
        run: terraform plan -var project_id='${{ secrets.PROJECT_ID }}' -var repository_id="board-controller-api" -var http2=true -out=tfplan.plan -lock=false

      - name: Terraform apply cloud run
        run: terraform apply -auto-approve tfplan.plan

  depoloy-docker-image:
    runs-on: ubuntu-latest
    needs: create-artifact-register-terraform
    defaults:
      run:
        working-directory: backend/board-controller-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Google auth
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}"

      - name: Set up Docker Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker \
          us-east1-docker.pkg.dev

      - name: Login to GCR
        uses: docker/login-action@v1
        with:
          username: _json_key
          password: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          registry: gcr.io

      - name: Build Docker image
        run: |
          IMAGE_NAME="board-controller-api"
          IMAGE_TAG="latest"
          AR="us-east1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/board-controller-api"

          docker build -t $IMAGE_NAME --no-cache .
          docker tag $IMAGE_NAME:latest $AR/$IMAGE_NAME:$IMAGE_TAG

      - name: Push Docker image
        run: |
          IMAGE_NAME="board-controller-api"
          IMAGE_TAG="latest"
          AR="us-east1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/board-controller-api"

          docker push $AR/$IMAGE_NAME:$IMAGE_TAG

  deploy-cloud-run:
    runs-on: ubuntu-latest
    needs:
      - create-cloud-run-terraform
      - depoloy-docker-image

    steps:
      - name: Google auth
        id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: run cloud run
        run: |
          gcloud run deploy board-controller-api \
          --image=us-east1-docker.pkg.dev/${{ secrets.PROJECT_ID }}/board-controller-api/board-controller-api:latest \
          --allow-unauthenticated \
          --port=8080 \
          --max-instances=10 \
          --region=us-east1 \
          --project=${{ secrets.PROJECT_ID }}
